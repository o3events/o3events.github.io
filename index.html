<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1f1f1f;
      --accent: #e8e0c8;
      --accent-dim: #7a7260;
      --text: #d4cfc4;
      --text-muted: #4a4740;
      --glow: rgba(232, 224, 200, 0.06);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.4;
      pointer-events: none;
    }

    /* vignette */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, var(--bg) 100%);
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
      padding: 40px;
      animation: fadeUp 1s ease both;
    }

    /* LOGO PLACEHOLDER */
    .logo-wrapper {
      position: relative;
    }

    .logo-box {
      width: 96px;
      height: 96px;
      border: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      animation: fadeUp 1s 0.1s ease both;
    }

    /* Corner accents */
    .logo-box::before,
    .logo-box::after {
      content: '';
      position: absolute;
      width: 10px;
      height: 10px;
      border-color: var(--accent-dim);
      border-style: solid;
    }
    .logo-box::before {
      top: -1px; left: -1px;
      border-width: 1px 0 0 1px;
    }
    .logo-box::after {
      bottom: -1px; right: -1px;
      border-width: 0 1px 1px 0;
    }

    /* Shimmer sweep */
    .logo-box .shimmer {
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg, transparent 40%, rgba(232,224,200,0.06) 50%, transparent 60%);
      animation: shimmer 3s 1.5s ease-in-out infinite;
    }

    .logo-label {
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-top: 10px;
      text-align: center;
    }

    /* Replace .logo-img with your <img> tag */
    .logo-img {
      width: 56px;
      height: 56px;
      object-fit: contain;
      /* placeholder cross */
      background: none;
    }

    /* placeholder cross shown only when no real img is inside */
    .logo-placeholder {
      width: 56px;
      height: 56px;
      position: relative;
      opacity: 0.18;
    }
    .logo-placeholder::before,
    .logo-placeholder::after {
      content: '';
      position: absolute;
      background: var(--accent);
    }
    .logo-placeholder::before {
      width: 1px; height: 100%;
      left: 50%; top: 0; transform: translateX(-50%);
    }
    .logo-placeholder::after {
      height: 1px; width: 100%;
      top: 50%; left: 0; transform: translateY(-50%);
    }

    /* HEADING */
    .heading {
      text-align: center;
      animation: fadeUp 1s 0.2s ease both;
    }

    .heading h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(64px, 12vw, 128px);
      letter-spacing: 0.06em;
      line-height: 0.9;
      color: var(--accent);
      text-shadow: 0 0 80px rgba(232,224,200,0.08);
    }

    .heading p {
      font-size: 11px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 16px;
    }

    /* DIVIDER */
    .divider {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, transparent, var(--border), transparent);
      animation: fadeUp 1s 0.3s ease both;
    }

    /* STATUS LINE */
    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      animation: fadeUp 1s 0.4s ease both;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-dim);
      animation: pulse 2s ease-in-out infinite;
    }

    /* NOTIFY FORM */
    .notify {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      animation: fadeUp 1s 0.5s ease both;
      position: relative;
    }

    .notify::before,
    .notify::after {
      content: '';
      position: absolute;
      width: 8px;
      height: 8px;
      border-color: var(--accent-dim);
      border-style: solid;
    }
    .notify::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
    .notify::after  { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }

    .notify input {
      background: transparent;
      border: none;
      outline: none;
      padding: 12px 20px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--text);
      width: 220px;
      letter-spacing: 0.05em;
    }

    .notify input::placeholder { color: var(--text-muted); }

    .notify button {
      background: var(--surface);
      border: none;
      border-left: 1px solid var(--border);
      padding: 12px 20px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      cursor: pointer;
      transition: background 0.2s;
    }

    .notify button:hover { background: #1a1a1a; }

    /* FOOTER */
    .footer {
      position: fixed;
      bottom: 32px;
      left: 0; right: 0;
      display: flex;
      justify-content: center;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      animation: fadeUp 1s 0.7s ease both;
    }

    /* KEYFRAMES */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes shimmer {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(200%); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.3); }
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- LOGO: replace <div class="logo-placeholder"></div> with <img class="logo-img" src="your-logo.png" alt="Logo"> -->
    <div class="logo-wrapper">
      <div class="logo-box">
        <div class="shimmer"></div>
        <div class="logo-placeholder"></div>
        <img class="logo-img" src="logo.png" alt="Logo">
      </div>
    </div>

    <div class="heading">
      <h1>Coming<br>Soon</h1>
      <p>Something worth waiting for</p>
    </div>

    <div class="divider"></div>

    <div class="status">
      <span class="dot"></span>
      <span>Currently in development</span>
    </div>

    <div class="notify">
      <input type="email" placeholder="your@email.com" />
      <button>Notify me</button>
    </div>

  </div>

  <div class="footer">
    &copy; 2026 &nbsp;·&nbsp; All rights reserved
  </div>

</body>
</html>
